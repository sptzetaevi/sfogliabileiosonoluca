<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4efe7" />
  <style>
    :root{
      --page-size:min(80vh, 45vw, 720px);
      --shadow: 0 18px 45px rgba(0,0,0,.24);
      --soft: rgba(255,255,255,.82);
      --ink:#1f1f1f;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; overflow:hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background: radial-gradient(circle at 50% 18%, #fffaf1 0 18%, #efe0c7 62%, #cab18c 100%);}
    body{display:flex; align-items:center; justify-content:center; padding:18px; user-select:none; touch-action:manipulation;}
    .stage{width:100%; height:100%; display:grid; place-items:center; position:relative;}
    .book-wrap{position:relative; width:calc(var(--page-size) * 2); height:var(--page-size); perspective:2300px; filter: drop-shadow(0 24px 35px rgba(0,0,0,.26)); margin-inline:auto;}
    .book{position:absolute; left:50%; top:0; width:var(--page-size); height:var(--page-size); transform-style:preserve-3d; transform:translateX(0) rotateX(2deg);}
    .book::before{content:""; position:absolute; inset:1.6% auto 1.6% -1.3%; width:5%; border-radius:18px 0 0 18px; background:linear-gradient(90deg, rgba(70,43,20,.42), rgba(255,255,255,.12), rgba(0,0,0,.16)); z-index:0; filter:blur(.2px);}
    .book::after{content:""; position:absolute; inset:3% -2.8% 3% auto; width:4%; border-radius:0 18px 18px 0; background:rgba(0,0,0,.11); filter:blur(6px); z-index:0;}
    .sheet{position:absolute; inset:0; transform-origin:left center; transform-style:preserve-3d; transition:transform 920ms cubic-bezier(.2,.75,.15,1), z-index 0ms linear 460ms; border-radius:18px; will-change:transform;}
    .sheet.flipped{transform:rotateY(-180deg);}
    .face{position:absolute; inset:0; overflow:hidden; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:18px; background:#fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08), 5px 0 22px rgba(0,0,0,.16);}
    .front::after{content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(90deg, rgba(0,0,0,.22), rgba(255,255,255,0) 7%, rgba(255,255,255,0) 82%, rgba(0,0,0,.08)); mix-blend-mode:multiply; opacity:.48;}
    .back{transform:rotateY(180deg); box-shadow: inset 0 0 0 1px rgba(0,0,0,.08), -5px 0 22px rgba(0,0,0,.14);}
    .back::after{content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(270deg, rgba(0,0,0,.19), rgba(255,255,255,0) 8%, rgba(255,255,255,0) 82%, rgba(0,0,0,.07)); mix-blend-mode:multiply; opacity:.42;}
    .face img{width:100%; height:100%; display:block; object-fit:cover; pointer-events:none;}
    .click-zone{position:absolute; top:0; bottom:0; width:38%; z-index:200; border:0; background:transparent; cursor:pointer; padding:0;}
    .click-zone.left{left:0}.click-zone.right{right:0}
    .controls{position:fixed; left:50%; bottom:calc(14px + env(safe-area-inset-bottom)); transform:translateX(-50%); display:flex; gap:10px; align-items:center; z-index:500; padding:8px; border-radius:999px; background:rgba(255,255,255,.78); backdrop-filter:blur(10px); box-shadow:0 8px 24px rgba(0,0,0,.16);}
    button.ctrl, a.last-link{border:0; border-radius:999px; padding:10px 16px; font-weight:800; font-size:15px; color:#222; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.15); cursor:pointer; text-decoration:none;}
    button.ctrl:disabled{opacity:.35; cursor:not-allowed;}
    .counter{min-width:72px; text-align:center; font-weight:800; font-size:14px; opacity:.75;}
    .last-link{position:absolute; left:50%; bottom:8.5%; transform:translateX(-50%); z-index:30; font-size:clamp(14px, 2.5vmin, 22px); padding:clamp(9px, 1.8vmin, 16px) clamp(18px, 3vmin, 30px); background:rgba(255,255,255,.93);}
    .comm-link{position:absolute;left:50%;bottom:6%;transform:translateX(-50%);z-index:40;background:rgba(255,255,255,.94);padding:12px 22px;border-radius:999px;text-decoration:none;color:#111;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.16);}
    .open-last{position:absolute; inset:0; z-index:20; display:block; font-size:0;}
    .hint{position:fixed; top:calc(12px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:500; background:rgba(255,255,255,.74); backdrop-filter:blur(10px); padding:8px 14px; border-radius:999px; font-weight:800; font-size:13px; box-shadow:0 5px 18px rgba(0,0,0,.12); opacity:.84;}
    @media (max-width:720px){:root{--page-size:min(94vw, 82vh)} body{padding:8px}.controls{gap:6px; padding:7px}button.ctrl{padding:9px 12px;font-size:14px}.hint{display:none}.book-wrap{width:var(--page-size); filter:drop-shadow(0 18px 24px rgba(0,0,0,.25))}.book{left:0}.sheet,.face{border-radius:12px}}
    @media (prefers-reduced-motion: reduce){.sheet{transition:transform 1ms linear}}
  </style>
</head>
<body>
  <main class="stage" aria-label="Pagine interattive">
    <div class="hint">Clicca ai lati oppure usa le frecce</div>
    <div class="book-wrap">
      <div class="book" id="book" aria-live="polite"></div>
      <button class="click-zone left" id="prevZone" aria-label="Pagina precedente"></button>
      <button class="click-zone right" id="nextZone" aria-label="Pagina successiva"></button>
    </div>
    <div class="controls">
      <button class="ctrl" id="prevBtn" type="button">←</button>
      <span class="counter" id="counter">1 / 20</span>
      <button class="ctrl" id="soundBtn" type="button" aria-pressed="true">suono sì</button>
      <button class="ctrl" id="nextBtn" type="button">→</button>
    </div>
  </main>

  <script>
    const pages = Array.from({length:20}, (_,i)=>`assets/page_${String(i+1).padStart(2,'0')}.png`);
    const book = document.getElementById('book');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const soundBtn = document.getElementById('soundBtn');
    const prevZone = document.getElementById('prevZone');
    const nextZone = document.getElementById('nextZone');
    const totalSheets = Math.ceil(pages.length / 2);
    let index = 0;
    let soundOn = true;
    let busy = false;


    const communicationLinks = {
      13: 'https://sptzetaevi.github.io/iosonolucacosavoglio/',
      14: 'https://sptzetaevi.github.io/iosonolucasentirsi/',
      18: 'https://sptzetaevi.github.io/iosonolucaapp2/',
      19: 'https://sptzetaevi.github.io/iosonolucaapp2/'
    };

    function makeFace(className, src, pageNumber){
      const face = document.createElement('div');
      face.className = `face ${className}`;
      const img = document.createElement('img');
      img.src = src;
      img.alt = `Pagina ${pageNumber}`;
      face.appendChild(img);
      if(pageNumber === 20){
        const area = document.createElement('a');
        area.className = 'open-last';
        area.href = 'https://widgitonline.com/it/home';
        area.target = '_blank';
        area.rel = 'noopener noreferrer';
        area.setAttribute('aria-label','Apri Widgit Online');
        face.appendChild(area);
        const btn = document.createElement('a');
        btn.className = 'last-link';
        btn.href = 'https://widgitonline.com/it/home';
        btn.target = '_blank';
        btn.rel = 'noopener noreferrer';
        btn.textContent = 'APRI';
        face.appendChild(btn);
      }

      if(communicationLinks[pageNumber]){
        const comm = document.createElement('a');
        comm.className = 'comm-link';
        comm.href = communicationLinks[pageNumber];
        comm.target = '_blank';
        comm.rel = 'noopener noreferrer';
        comm.textContent = 'Prova a comunicare';
        face.appendChild(comm);
      }

      return face;
    }

    for(let s=0; s<totalSheets; s++){
      const sheet = document.createElement('section');
      sheet.className = 'sheet';
      sheet.style.zIndex = String(totalSheets - s);
      const frontNumber = s*2 + 1;
      const backNumber = s*2 + 2;
      sheet.appendChild(makeFace('front', pages[frontNumber-1], frontNumber));
      if(pages[backNumber-1]) sheet.appendChild(makeFace('back', pages[backNumber-1], backNumber));
      book.appendChild(sheet);
    }
    const sheets = [...document.querySelectorAll('.sheet')];

    function pageSound(direction=1){
      if(!soundOn) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();
      const duration = .18;
      const buffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0; i<data.length; i++){
        const t = i / data.length;
        const noise = (Math.random()*2-1) * (1-t) * (direction > 0 ? 1 : .85);
        data[i] = noise * .28;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 650;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + .025);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      src.connect(filter).connect(gain).connect(ctx.destination);
      src.start();
      src.stop(ctx.currentTime + duration);
      setTimeout(()=>ctx.close(), 320);
    }

    function render(direction=1){
      sheets.forEach((sheet, s)=>{
        const shouldFlip = index > s*2;
        sheet.classList.toggle('flipped', shouldFlip);
        sheet.style.zIndex = shouldFlip ? String(s+1) : String(totalSheets - s + 10);
      });
      counter.textContent = `${Math.min(index+1, pages.length)} / ${pages.length}`;
      prevBtn.disabled = index <= 0;
      nextBtn.disabled = index >= pages.length - 1;
      prevZone.disabled = prevBtn.disabled;
      nextZone.disabled = nextBtn.disabled;
      pageSound(direction);
    }

    function go(delta){
      if(busy) return;
      const next = Math.max(0, Math.min(pages.length-1, index + delta));
      if(next === index) return;
      busy = true;
      index = next;
      render(delta);
      setTimeout(()=>busy=false, 620);
    }

    nextBtn.addEventListener('click', ()=>go(1));
    prevBtn.addEventListener('click', ()=>go(-1));
    nextZone.addEventListener('click', ()=>go(1));
    prevZone.addEventListener('click', ()=>go(-1));
    soundBtn.addEventListener('click', ()=>{
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? 'suono sì' : 'suono no';
      soundBtn.setAttribute('aria-pressed', String(soundOn));
    });
    document.addEventListener('keydown', e=>{
      if(e.key === 'ArrowRight' || e.key === 'PageDown') go(1);
      if(e.key === 'ArrowLeft' || e.key === 'PageUp') go(-1);
    });

    let startX = 0, startY = 0;
    document.addEventListener('touchstart', e=>{startX=e.changedTouches[0].clientX; startY=e.changedTouches[0].clientY;},{passive:true});
    document.addEventListener('touchend', e=>{
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if(Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy)*1.4) go(dx < 0 ? 1 : -1);
    },{passive:true});

    render(0);
  </script>
</body>
</html>
